name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-python:
    name: Build Python package
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install build twine
      - run: python -m build
      - run: twine check dist/*
      - uses: actions/upload-artifact@v4
        with:
          name: python-dist
          path: dist/*

  build-deb:
    name: Build .deb package
    runs-on: ubuntu-latest
    container:
      image: debian:bookworm
    steps:
      - uses: actions/checkout@v4
      - name: Install build deps
        run: |
          apt-get update -qq
          apt-get install -y -qq devscripts debhelper dh-python \
            python3-all python3-setuptools python3-requests \
            python3-pyqtgraph python3-cryptography python3-pip \
            pybuild-plugin-pyproject
          pip3 install PySide6 --break-system-packages
      - name: Build .deb
        run: dpkg-buildpackage -b --no-sign
      - name: Copy .deb
        run: |
          mkdir -p artifacts
          cp ../*.deb artifacts/
      - uses: actions/upload-artifact@v4
        with:
          name: deb-package
          path: artifacts/*.deb

  build-rpm:
    name: Build .rpm package
    runs-on: ubuntu-latest
    container:
      image: fedora:40
    steps:
      - uses: actions/checkout@v4
      - name: Install build deps
        run: |
          dnf install -y -q rpm-build python3-devel python3-setuptools \
            python3-pip python3-wheel python3-requests \
            python3-pyqtgraph python3-cryptography
          pip3 install PySide6 --break-system-packages
      - name: Build .rpm
        run: |
          mkdir -p /tmp/rpmbuild/{BUILD,RPMS,SOURCES,SPECS,SRPMS}
          version="${GITHUB_REF_NAME#v}"
          sed -i "s/Version:.*/Version: ${version}/" pve-center.spec
          # create source tarball from checkout
          tar czf /tmp/rpmbuild/SOURCES/pvecenter-${version}.tar.gz \
            --transform="s,^,pvecenter-${version}/," \
            --exclude=.git \
            --exclude=venv \
            --exclude=__pycache__ \
            --exclude='*.pyc' \
            --exclude='nodes.*' \
            .
          cp pve-center.spec /tmp/rpmbuild/SPECS/
          rpmbuild -bb --define "_topdir /tmp/rpmbuild" /tmp/rpmbuild/SPECS/pve-center.spec
      - name: Copy .rpm
        run: |
          mkdir -p artifacts
          cp /tmp/rpmbuild/RPMS/noarch/*.rpm artifacts/
      - uses: actions/upload-artifact@v4
        with:
          name: rpm-package
          path: artifacts/*.rpm

  build-windows:
    name: Build Windows .zip
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install dependencies
        run: |
          pip install -e .
          pip install pyinstaller
      - name: Build with PyInstaller
        run: pyinstaller packaging/pve-center-win.spec --noconfirm
      - name: Zip dist folder
        shell: pwsh
        run: Compress-Archive -Path dist/pvecenter/* -DestinationPath pvecenter-windows.zip
      - uses: actions/upload-artifact@v4
        with:
          name: windows-zip
          path: pvecenter-windows.zip

  build-windows-installer:
    name: Build Windows .exe installer
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install dependencies
        run: |
          pip install -e .
          pip install pyinstaller
      - name: Build with PyInstaller
        run: pyinstaller packaging/pve-center-win.spec --noconfirm
      - name: Install NSIS via Chocolatey
        shell: pwsh
        run: |
          choco install nsis -y --no-progress
      - name: Build installer with NSIS
        shell: pwsh
        run: |
          $version = "${{ github.ref_name }}".TrimStart("v")
          $distDir = Resolve-Path "dist/pvecenter"
          $nsisPath = "C:\Program Files (x86)\NSIS"
          if (Test-Path "$nsisPath\makensis.exe") {
            & "$nsisPath\makensis.exe" /DVERSION=$version /DDISTDIR="$distDir" packaging/pve-center-installer.nsi
          } else {
            $env:PATH = "C:\Program Files (x86)\NSIS;" + $env:PATH
            makensis /DVERSION=$version /DDISTDIR="$distDir" packaging/pve-center-installer.nsi
          }
      - name: Rename installer
        shell: pwsh
        run: |
          $version = "${{ github.ref_name }}".TrimStart("v")
          Move-Item packaging/pvecenter-setup.exe "pvecenter-${version}-setup.exe" -Force
      - uses: actions/upload-artifact@v4
        with:
          name: windows-installer
          path: pvecenter-*-setup.exe

  create-release:
    name: Create GitHub Release
    needs: [build-python, build-deb, build-rpm, build-windows, build-windows-installer]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          pattern: '*'
          merge-multiple: true
          path: artifacts/
      - name: Generate checksums
        working-directory: artifacts
        run: sha256sum * > checksums.txt
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: PVE Center ${{ github.ref_name }}
          body: |
            ## PVE Center ${{ github.ref_name }}

            Скачать: `.deb` для Debian/Ubuntu, `.rpm` для Fedora/RHEL, `.zip` для Windows, `.tar.gz` / `.whl` для pip.

            Установка .deb:
            ```
            sudo dpkg -i pve-center_*.deb
            pip install proxmoxer
            sudo apt install virt-viewer
            ```

            Установка .rpm:
            ```
            sudo dnf install pve-center-*.rpm
            pip install proxmoxer
            sudo dnf install virt-viewer
            ```

            Установка Windows:
            ```
            Распакуйте .zip в любую папку, запустите pvecenter.exe.
            Для консоли VM установите virt-viewer:
            https://virt-manager.org/download/
            ```

            Установка через pip:
            ```
            pip install pvecenter
            ```
          files: artifacts/*
