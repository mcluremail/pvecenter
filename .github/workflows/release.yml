name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build-python:
    name: Build Python package
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install build twine
      - run: python -m build
      - run: twine check dist/*
      - uses: actions/upload-artifact@v4
        with:
          name: python-dist
          path: dist/*

  build-deb:
    name: Build .deb package
    runs-on: ubuntu-latest
    container:
      image: debian:bookworm
    steps:
      - uses: actions/checkout@v4
      - name: Install build deps
        run: |
          apt-get update -qq
          apt-get install -y -qq devscripts debhelper dh-python \
            python3-all python3-setuptools python3-pyside6 \
            python3-requests python3-pyqtgraph python3-cryptography
      - name: Build .deb
        run: dpkg-buildpackage -b --no-sign
      - name: Copy .deb
        run: |
          mkdir -p artifacts
          cp ../*.deb artifacts/
      - uses: actions/upload-artifact@v4
        with:
          name: deb-package
          path: artifacts/*.deb

  build-rpm:
    name: Build .rpm package
    runs-on: ubuntu-latest
    container:
      image: fedora:40
    steps:
      - uses: actions/checkout@v4
      - name: Install build deps
        run: |
          dnf install -y -q rpm-build python3-devel python3-setuptools \
            python3-pyside6 python3-requests python3-pyqtgraph python3-cryptography
      - name: Build .rpm
        run: |
          mkdir -p /tmp/rpmbuild/{BUILD,RPMS,SOURCES,SPECS,SRPMS}
          version="${GITHUB_REF_NAME#v}"
          sed -i "s/Version:.*/Version: ${version}/" pve-center.spec
          # create source tarball from checkout
          tar czf /tmp/rpmbuild/SOURCES/pvecenter-${version}.tar.gz \
            --transform="s,^,pvecenter-${version}/," \
            --exclude=.git \
            --exclude=venv \
            --exclude=__pycache__ \
            --exclude='*.pyc' \
            --exclude='nodes.*' \
            .
          cp pve-center.spec /tmp/rpmbuild/SPECS/
          rpmbuild -bb --define "_topdir /tmp/rpmbuild" /tmp/rpmbuild/SPECS/pve-center.spec
      - name: Copy .rpm
        run: |
          mkdir -p artifacts
          cp /tmp/rpmbuild/RPMS/noarch/*.rpm artifacts/
      - uses: actions/upload-artifact@v4
        with:
          name: rpm-package
          path: artifacts/*.rpm

  create-release:
    name: Create GitHub Release
    needs: [build-python, build-deb, build-rpm]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          pattern: '*'
          merge-multiple: true
          path: artifacts/
      - name: Generate checksums
        working-directory: artifacts
        run: sha256sum * > checksums.txt
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: PVE Center ${{ github.ref_name }}
          body: |
            ## PVE Center ${{ github.ref_name }}

            Скачать: `.deb` для Debian/Ubuntu, `.rpm` для Fedora/RHEL, `.tar.gz` / `.whl` для pip.

            Установка .deb:
            ```
            sudo dpkg -i pve-center_*.deb
            pip install proxmoxer
            sudo apt install virt-viewer
            ```

            Установка .rpm:
            ```
            sudo dnf install pve-center-*.rpm
            pip install proxmoxer
            sudo dnf install virt-viewer
            ```

            Установка через pip:
            ```
            pip install pvecenter
            ```
          files: artifacts/*
