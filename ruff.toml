target-version = "py310"
line-length = 100

[lint]
select = ["E", "F", "W", "I", "B", "UP"]
ignore = [
    "E701",  # multiple-statements-on-one-line-colon (compact try/except)
    "E501",  # line too long (handled by formatter)
    "E402",  # module-level import not at top (lazy imports by design)
    "E731",  # lambda assignment (used for Qt signal slots)
    "B023",  # function-uses-loop-variable (false positive for immediately-invoked lambdas)
]

[lint.per-file-ignores]
"__init__.py" = ["F401"]  # re-exports
"*/i18n/__init__.py" = ["F401"]